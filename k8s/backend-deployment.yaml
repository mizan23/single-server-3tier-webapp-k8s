apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: mizan23/bmi-backend:v1
        env:
        - name: DATABASE_URL
          value: postgresql://bmi_user:bmipass@postgres-service:5432/bmidb
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3000"
        ports:
        - containerPort: 3000